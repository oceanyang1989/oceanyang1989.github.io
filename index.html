<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>肉串大战 - 算术格斗</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: #fff;
        }
        
        /* 开场动画 */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 300;
            cursor: pointer;
        }
        #intro-screen.hidden { display: none; }
        #intro-video {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .skip-hint {
            position: absolute;
            bottom: 30px; right: 40px;
            color: rgba(255,255,255,0.6);
            font-size: 16px;
        }
        
        /* 选择界面 */
        #challenge-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('challenge_bg.jpg') center center / cover no-repeat;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #challenge-screen.show { display: flex; }
        
        .challenge-title {
            font-size: 48px;
            color: #ffd700;
            text-shadow: 4px 4px 0 #ff6b35;
            margin-bottom: 40px;
        }
        
        .difficulty-btns {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .difficulty-btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border: 3px solid #ffd700;
            border-radius: 15px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .difficulty-btn:hover {
            background: #ffd700;
            color: #000;
            transform: scale(1.1);
        }
        .difficulty-btn.easy { border-color: #44cc44; }
        .difficulty-btn.easy:hover { background: #44cc44; }
        .difficulty-btn.normal { border-color: #ff9933; }
        .difficulty-btn.normal:hover { background: #ff9933; }
        .difficulty-btn.hard { border-color: #ff4444; }
        .difficulty-btn.hard:hover { background: #ff4444; }
        
        #select-countdown {
            font-size: 28px;
            color: #fff;
        }
        #select-countdown.warning { color: #ff4444; animation: pulse 0.5s infinite; }
        
        .timeout-message {
            text-align: center;
        }
        .timeout-icon { font-size: 80px; margin-bottom: 20px; }
        .timeout-text { font-size: 36px; margin-bottom: 30px; }
        .restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #ffd700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        /* 游戏主界面 - 左右分屏 */
        #game-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            background: #0a0a1a;
        }
        #game-container.show { display: flex; }
        
        /* 左侧答题区 40% */
        #quiz-area {
            width: 40%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-right: 2px solid #333;
        }
        
        /* 血条区 */
        .hp-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 40px;
        }
        
        .hp-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .hp-label {
            width: 60px;
            font-size: 18px;
            font-weight: bold;
        }
        .hp-label.player { color: #44cc44; }
        .hp-label.enemy { color: #ff4444; }
        
        .hp-bar-bg {
            flex: 1;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            margin: 0 10px;
            border: 2px solid #fff;
        }
        
        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #e63946, #ff6b6b);
            transition: width 0.3s;
            border-radius: 15px;
        }
        .hp-bar.player { background: linear-gradient(90deg, #44cc44, #66ff66); }
        
        .hp-text {
            width: 70px;
            text-align: right;
            font-size: 16px;
        }
        
        /* 题目区 */
        #question-progress {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        #question-type {
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        #countdown {
            font-size: 60px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }
        #countdown.warning { color: #ff4444; animation: pulse 0.5s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        #question {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        
        #answer-input {
            width: 150px;
            height: 60px;
            font-size: 36px;
            text-align: center;
            border: 3px solid #ffd700;
            border-radius: 15px;
            background: rgba(255,255,255,0.9);
            color: #333;
            margin-bottom: 20px;
        }
        #answer-input:focus { outline: none; border-color: #ff6b35; }
        
        .btn-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        #submit-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
        }
        #submit-btn:hover { transform: scale(1.05); }
        
        #giveup-btn {
            padding: 15px 25px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #888;
            border-radius: 25px;
            color: #888;
            cursor: pointer;
        }
        #giveup-btn:hover { border-color: #ff4444; color: #ff4444; }
        
        #feedback {
            font-size: 24px;
            min-height: 36px;
        }
        .correct { color: #44cc44; }
        .wrong { color: #ff4444; }
        
        /* 右侧视频区 60% */
        #video-area {
            width: 60%;
            height: 100%;
            position: relative;
        }
        
        #game-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .vs-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        .player-labels {
            position: absolute;
            bottom: 20px;
            left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 10;
        }
        
        .char-label {
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
        }
        .char-label.player { color: #44cc44; }
        .char-label.enemy { color: #ff4444; }
        
        /* 结果界面 */
        #result-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 400;
        }
        #result-screen.show { display: flex; }
        
        #result-text {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        
        #result-stats {
            font-size: 24px;
            text-align: center;
            line-height: 2;
            margin-bottom: 40px;
        }
        
        #restart-btn {
            padding: 20px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        #restart-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <!-- 开场动画 -->
    <div id="intro-screen">
        <video id="intro-video" playsinline>
            <source src="intro_10s.mp4" type="video/mp4">
        </video>
    </div>
    
    <!-- 选择界面 -->
    <div id="challenge-screen">
        <h1 class="challenge-title">是否发起挑战？</h1>
        <div class="difficulty-btns">
            <button class="difficulty-btn easy" data-difficulty="easy">简单</button>
            <button class="difficulty-btn normal" data-difficulty="normal">普通</button>
            <button class="difficulty-btn hard" data-difficulty="hard">高难</button>
        </div>
        <div id="select-countdown">30</div>
    </div>
    
    <!-- 游戏主界面 -->
    <div id="game-container">
        <!-- 左侧答题区 -->
        <div id="quiz-area">
            <!-- 血条 -->
            <div class="hp-container">
                <div class="hp-row">
                    <span class="hp-label player">串串</span>
                    <div class="hp-bar-bg">
                        <div class="hp-bar player" id="player-hp-bar"></div>
                    </div>
                    <span class="hp-text" id="player-hp">200/200</span>
                </div>
                <div class="hp-row">
                    <span class="hp-label enemy">爸爸</span>
                    <div class="hp-bar-bg">
                        <div class="hp-bar" id="enemy-hp-bar"></div>
                    </div>
                    <span class="hp-text" id="enemy-hp">200/200</span>
                </div>
            </div>
            
            <!-- 题目 -->
            <div id="question-progress">第 1 / 16 题</div>
            <div id="question-type">✨ 简单题</div>
            <div id="countdown">20</div>
            <div id="question">25 + 37 = ?</div>
            
            <input type="number" id="answer-input" inputmode="numeric" pattern="[0-9]*" placeholder="?" autofocus>
            
            <div class="btn-row">
                <button id="submit-btn">确认</button>
                <button id="giveup-btn">放弃</button>
            </div>
            
            <div id="feedback"></div>
        </div>
        
        <!-- 右侧视频区 -->
        <div id="video-area">
            <video id="game-video" playsinline></video>
            <div class="vs-label">⚔️ 肉串大战 ⚔️</div>
            <div class="player-labels">
                <span class="char-label player">串串 (你)</span>
                <span class="char-label enemy">爸爸 (AI)</span>
            </div>
        </div>
    </div>
    
    <!-- 结果界面 -->
    <div id="result-screen">
        <div id="result-text">串串胜利！🎉</div>
        <div id="result-stats"></div>
        <button id="restart-btn">再来一局</button>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
