<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="landscape">
    <meta name="x5-orientation" content="landscape">
    <title>肉串大战 - 算术格斗</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: #fff;
            touch-action: manipulation;
        }
        
        /* 横屏提示 */
        #rotate-hint {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        #rotate-hint.show { display: flex; }
        .rotate-icon {
            font-size: 80px;
            animation: rotate-phone 1.5s ease-in-out infinite;
        }
        @keyframes rotate-phone {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }
        .rotate-text {
            font-size: 18px;
            color: #ffd700;
            margin-top: 20px;
            text-align: center;
            line-height: 1.6;
        }
        .continue-btn {
            margin-top: 30px;
            padding: 10px 30px;
            font-size: 16px;
            background: #ffd700;
            border: none;
            border-radius: 20px;
            color: #000;
            cursor: pointer;
        }
        
        /* 开场动画 */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 300;
        }
        #intro-screen.hidden { display: none; }
        #intro-video {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        
        /* 选择界面 */
        #challenge-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('challenge_bg.jpg') center center / cover no-repeat;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #challenge-screen.show { display: flex; }
        
        /* 加载界面 */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0a1a;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 250;
        }
        #loading-screen.show { display: flex; }
        .loading-text {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
        }
        .loading-bar {
            width: 200px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
        }
        .loading-progress {
            height: 100%;
            background: #ffd700;
            width: 0%;
            transition: width 0.3s;
        }
        .loading-percent {
            font-size: 16px;
            color: #aaa;
            margin-top: 10px;
        }
        
        .challenge-title {
            font-size: 32px;
            color: #ffd700;
            text-shadow: 3px 3px 0 #ff6b35;
            margin-bottom: 30px;
        }
        
        .difficulty-btns {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .difficulty-btn {
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ffd700;
            border-radius: 10px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            cursor: pointer;
        }
        .difficulty-btn:active {
            transform: scale(0.95);
        }
        .difficulty-btn.easy { border-color: #44cc44; }
        .difficulty-btn.easy:active { background: #44cc44; }
        .difficulty-btn.normal { border-color: #ff9933; }
        .difficulty-btn.normal:active { background: #ff9933; }
        .difficulty-btn.hard { border-color: #ff4444; }
        .difficulty-btn.hard:active { background: #ff4444; }
        
        #select-countdown {
            font-size: 20px;
            color: #fff;
        }
        #select-countdown.warning { color: #ff4444; animation: pulse 0.5s infinite; }
        
        .timeout-message { text-align: center; }
        .timeout-icon { font-size: 60px; margin-bottom: 15px; }
        .timeout-text { font-size: 24px; margin-bottom: 20px; }
        .restart-btn {
            padding: 12px 30px;
            font-size: 18px;
            background: #ffd700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        /* 游戏主界面 - 左右分屏 */
        #game-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            background: #0a0a1a;
        }
        #game-container.show { display: flex; }
        
        /* 左侧答题区 */
        #quiz-area {
            width: 35%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 5px;
            border-right: 2px solid #333;
        }
        
        /* 血条区 - 单行紧凑 */
        .hp-container {
            width: 100%;
            margin-bottom: 3px;
        }
        
        .hp-single-row {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 8px;
            margin-bottom: 2px;
        }
        
        .hp-label-mini {
            font-weight: bold;
            white-space: nowrap;
            width: 22px;
        }
        .hp-label-mini.player { color: #44cc44; }
        .hp-label-mini.enemy { color: #ff4444; }
        
        .hp-bar-mini {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .hp-fill {
            height: 100%;
            transition: width 0.3s;
            border-radius: 2px;
        }
        .hp-fill.player { background: linear-gradient(90deg, #44cc44, #66ff66); }
        .hp-fill.enemy { background: linear-gradient(90deg, #e63946, #ff6b6b); }
        
        .hp-num {
            min-width: 20px;
            text-align: right;
            font-size: 7px;
        }
        
        /* 题目区 - 紧凑 */
        #question-progress {
            font-size: 9px;
            color: #aaa;
            margin-bottom: 1px;
        }
        
        #question-type {
            font-size: 10px;
            margin-bottom: 1px;
        }
        
        #countdown {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 3px;
        }
        #countdown.warning { color: #ff4444; animation: pulse 0.5s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        #question {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        /* 答案显示框 */
        #answer-display {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
            min-height: 28px;
            margin-bottom: 4px;
            background: rgba(255,215,0,0.1);
            padding: 2px 10px;
            border-radius: 5px;
            border: 2px solid #ffd700;
        }
        
        /* 自定义数字键盘 */
        #numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            width: 100%;
            max-width: 140px;
            margin-bottom: 4px;
        }
        
        .numpad-btn {
            padding: 6px;
            font-size: 16px;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            border: 2px solid #555;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            user-select: none;
        }
        .numpad-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.95);
        }
        .numpad-btn.clear {
            background: rgba(255,68,68,0.3);
            border-color: #ff4444;
        }
        .numpad-btn.submit {
            background: rgba(68,204,68,0.3);
            border-color: #44cc44;
        }
        
        .btn-row {
            display: flex;
            gap: 5px;
        }
        
        .action-btn {
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            border: 2px solid;
            border-radius: 5px;
            background: transparent;
            cursor: pointer;
        }
        #submit-btn {
            border-color: #44cc44;
            color: #44cc44;
        }
        #giveup-btn {
            border-color: #ff9933;
            color: #ff9933;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
        
        #feedback {
            font-size: 10px;
            font-weight: bold;
            margin-top: 3px;
            min-height: 14px;
        }
        .correct { color: #44cc44; }
        .wrong { color: #ff4444; }
        
        /* 隐藏原始输入框 */
        #answer-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        
        /* 右侧视频区 */
        #video-area {
            width: 65%;
            height: 100%;
            position: relative;
        }
        
        #game-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .vs-label {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        .player-labels {
            position: absolute;
            bottom: 15px;
            left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 10;
        }
        
        .char-label {
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 15px;
        }
        .char-label.enemy { color: #ff4444; }  /* 左边是爸爸 */
        .char-label.player { color: #44cc44; } /* 右边是串串 */
        
        /* 结果界面 */
        #result-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 400;
        }
        #result-screen.show { display: flex; }
        
        #result-text {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        #result-stats {
            font-size: 16px;
            text-align: center;
            line-height: 1.8;
            margin-bottom: 25px;
        }
        
        #restart-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* 响应式 - 手机横屏优化 */
        @media (max-height: 500px) {
            .challenge-title { font-size: 24px; margin-bottom: 15px; }
            .difficulty-btn { padding: 10px 18px; font-size: 14px; }
            #select-countdown { font-size: 16px; }
            
            #quiz-area { padding: 8px; }
            .hp-container { margin-bottom: 5px; }
            .hp-row { margin-bottom: 4px; }
            .hp-label { font-size: 10px; width: 35px; }
            .hp-bar-bg { height: 12px; }
            .hp-text { font-size: 10px; width: 45px; }
            
            #question-progress { font-size: 10px; }
            #question-type { font-size: 11px; }
            #countdown { font-size: 28px; margin-bottom: 5px; }
            #question { font-size: 22px; margin-bottom: 5px; }
            #answer-display { font-size: 26px; min-height: 32px; padding: 3px 15px; }
            
            #numpad { gap: 4px; max-width: 160px; }
            .numpad-btn { padding: 8px; font-size: 18px; }
            
            .btn-row { gap: 5px; }
            .action-btn { padding: 6px 12px; font-size: 12px; }
            #feedback { font-size: 12px; margin-top: 5px; }
            
            .vs-label { font-size: 12px; top: 5px; }
            .player-labels { padding: 0 15px; bottom: 8px; }
            .char-label { font-size: 11px; padding: 3px 8px; }
        }
    </style>
</head>
<body>
    <!-- 横屏提示 -->
    <div id="rotate-hint">
        <div class="rotate-icon">📱</div>
        <div class="rotate-text">请复制链接至浏览器打开<br>并横屏开始游戏哦</div>
        <button class="continue-btn" id="continue-btn" onclick="hideRotateHint()">我知道了，继续</button>
    </div>
    
    <!-- 开场动画 -->
    <div id="intro-screen">
        <video id="intro-video" playsinline>
            <source src="intro_10s.mp4" type="video/mp4">
        </video>
    </div>
    
    <!-- 加载界面 -->
    <div id="loading-screen">
        <div class="loading-text">⚔️ 肉串大战 ⚔️</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loading-progress"></div>
        </div>
        <div class="loading-percent" id="loading-percent">加载中... 0%</div>
    </div>
    
    <!-- 选择界面 -->
    <div id="challenge-screen">
        <h1 class="challenge-title">是否发起挑战？</h1>
        <div class="difficulty-btns">
            <button class="difficulty-btn easy" data-difficulty="easy">简单</button>
            <button class="difficulty-btn normal" data-difficulty="normal">普通</button>
            <button class="difficulty-btn hard" data-difficulty="hard">高难</button>
        </div>
        <div id="select-countdown">30</div>
    </div>
    
    <!-- 游戏主界面 -->
    <div id="game-container">
        <!-- 左侧答题区 -->
        <div id="quiz-area">
            <!-- 血条 -->
            <div class="hp-container">
                <div class="hp-single-row">
                    <span class="hp-label-mini player">串串</span>
                    <div class="hp-bar-mini">
                        <div class="hp-fill player" id="player-hp-bar"></div>
                    </div>
                    <span class="hp-num" id="player-hp">200</span>
                </div>
                <div class="hp-single-row">
                    <span class="hp-label-mini enemy">爸爸</span>
                    <div class="hp-bar-mini">
                        <div class="hp-fill enemy" id="enemy-hp-bar"></div>
                    </div>
                    <span class="hp-num" id="enemy-hp">200</span>
                </div>
            </div>
            
            <!-- 题目 -->
            <div id="question-progress">第 1 / 16 题</div>
            <div id="question-type">✨ 简单题</div>
            <div id="countdown">30</div>
            <div id="question">25 + 37 = ?</div>
            
            <!-- 答案显示 -->
            <div id="answer-display">?</div>
            
            <!-- 数字键盘 -->
            <div id="numpad">
                <button class="numpad-btn" data-num="1">1</button>
                <button class="numpad-btn" data-num="2">2</button>
                <button class="numpad-btn" data-num="3">3</button>
                <button class="numpad-btn" data-num="4">4</button>
                <button class="numpad-btn" data-num="5">5</button>
                <button class="numpad-btn" data-num="6">6</button>
                <button class="numpad-btn" data-num="7">7</button>
                <button class="numpad-btn" data-num="8">8</button>
                <button class="numpad-btn" data-num="9">9</button>
                <button class="numpad-btn clear" data-num="clear">C</button>
                <button class="numpad-btn" data-num="0">0</button>
                <button class="numpad-btn submit" data-num="submit">✓</button>
            </div>
            
            <div class="btn-row">
                <button class="action-btn" id="submit-btn">确认</button>
                <button class="action-btn" id="giveup-btn">放弃</button>
            </div>
            
            <div id="feedback"></div>
            
            <!-- 隐藏的输入框 -->
            <input type="number" id="answer-input" inputmode="numeric" pattern="[0-9]*">
        </div>
        
        <!-- 右侧视频区 -->
        <div id="video-area">
            <video id="game-video" playsinline></video>
            <div class="vs-label">⚔️ 肉串大战 ⚔️</div>
            <div class="player-labels">
                <span class="char-label enemy">爸爸 (AI)</span>
                <span class="char-label player">串串 (你)</span>
            </div>
        </div>
    </div>
    
    <!-- 结果界面 -->
    <div id="result-screen">
        <div id="result-text">串串胜利！🎉</div>
        <div id="result-stats"></div>
        <button id="restart-btn">再来一局</button>
    </div>
    
    <script src="game.js?v=2026041823"></script>
</body>
</html>
